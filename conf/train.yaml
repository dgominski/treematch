defaults:
  - model: udm
  - backbone: resnet50
  - dataset: ps
  - dataset_noisy: ${dataset}_noisy
  - _self_
  - optional local: local

train:
  device: "cuda:0"
  batch_size: 8
  clean_ratio: 0.8
  nepoch: 500
  num_workers: 8
  logdir: "/scratch/checkpoints/treedensity/"
  imsize: 256
  val_freq: 1
